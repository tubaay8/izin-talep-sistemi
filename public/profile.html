<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profilim - Izin Talep Sistemi</title>
  <link rel="stylesheet" href="/css/style.css?v=20" />
  <link rel="stylesheet" href="/css/dark-theme.css?v=10" />
  <link rel="stylesheet" href="/css/profile-theme.css?v=11" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#8C6E63" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <link rel="icon" href="/icons/favicon-32.png" type="image/png" />
</head>
<body class="admin-layout">
  <aside class="admin-sidebar" id="admin-sidebar">
    <div class="sidebar-profile">
      <span class="sidebar-avatar" id="sidebar-avatar">İT</span>
      <strong class="sidebar-profile-name" id="sidebar-profile-name">...</strong>
      <span class="sidebar-profile-email" id="sidebar-profile-email">...</span>
    </div>
    <nav class="sidebar-menu" id="sidebar-menu"></nav>
    <button type="button" class="sidebar-logout" id="sidebar-logout-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
      <span class="sidebar-label">Çıkış Yap</span>
    </button>
  </aside>

  <header class="dashboard-header">
    <h1><span class="brand-logo">İT</span> İzin Talep Sistemi</h1>
    <div class="dashboard-header-user">
      <button type="button" class="header-icon-btn" id="theme-toggle-btn" title="Karanlık modu aç/kapat" aria-label="Karanlık modu aç/kapat">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" hidden><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
      </button>
      <button type="button" class="header-icon-btn" id="notif-btn" title="Bildirimler" aria-label="Bildirimler">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 00-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
      </button>
      <span>Hosgeldin, <strong id="user-name">...</strong></span>
      <span id="role-badge" class="role-badge"></span>
      <button id="logout-btn" class="logout-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
        Çıkış Yap
      </button>
    </div>
  </header>

  <main class="page-card">
    <nav class="profile-breadcrumb" aria-label="breadcrumb">
      <a href="/dashboard">Ana Sayfa</a>
      <span class="profile-breadcrumb-sep">/</span>
      <span>Profilim</span>
    </nav>
    <div class="page-header">
      <h1><span class="brand-logo">İT</span> Profilim</h1>
    </div>

    <div class="profile-layout">
      <div class="profile-photo-card">
        <div class="profile-avatar-wrap">
          <span class="profile-avatar" id="profile-avatar">İT</span>
          <img class="profile-avatar-img" id="profile-avatar-img" src="" alt="" hidden />
          <label for="profile_photo" class="profile-camera-badge" title="Fotoğraf Değiştir" aria-label="Fotoğraf Değiştir">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
          </label>
        </div>
        <label for="profile_photo" class="btn-outline profile-photo-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
          Fotoğraf Değiştir
        </label>
        <input type="file" id="profile_photo" name="profile_photo" accept="image/jpeg,image/png,image/webp" hidden />
        <span class="profile-photo-hint">JPG, PNG veya WEBP · en fazla 2 MB</span>
      </div>

      <form id="profile-form" class="form-card profile-form-card">
        <h2 class="profile-section-title">
          <span class="profile-section-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 9h18"/><path d="M7 14h4"/></svg></span>
          Kişisel Bilgiler
        </h2>
        <label for="full_name">Ad Soyad</label>
        <input type="text" id="full_name" name="full_name" required />

        <label for="email">E-posta</label>
        <input type="email" id="email" name="email" required />

        <button type="submit" id="submit-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>
          Değişiklikleri Kaydet
        </button>
        <p id="form-message" class="form-message"></p>
      </form>
    </div>

    <div class="profile-account-section">
      <h2 class="profile-section-title profile-section-title--readonly">
        <span class="profile-section-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9 12l2 2 4-4"/></svg></span>
        Hesap Bilgileri
      </h2>
      <div class="profile-readonly-grid">
        <div class="profile-readonly-field">
          <span class="profile-readonly-icon profile-readonly-icon--role"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
          <span class="profile-readonly-label">Rol</span>
          <span class="profile-readonly-value" id="profile-role">-</span>
        </div>
        <div class="profile-readonly-field">
          <span class="profile-readonly-icon profile-readonly-icon--department"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="3" width="16" height="18"/><path d="M9 8h1M14 8h1M9 12h1M14 12h1M9 16h1M14 16h1"/></svg></span>
          <span class="profile-readonly-label">Departman</span>
          <span class="profile-readonly-value" id="profile-department">-</span>
        </div>
        <div class="profile-readonly-field">
          <span class="profile-readonly-icon profile-readonly-icon--manager"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3"/><path d="M2 20c0-3.3 3.1-6 7-6s7 2.7 7 6"/><path d="M16 11l2 2 4-4"/></svg></span>
          <span class="profile-readonly-label">Yönetici</span>
          <span class="profile-readonly-value" id="profile-manager">-</span>
        </div>
        <div class="profile-readonly-field">
          <span class="profile-readonly-icon profile-readonly-icon--status"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9 12l2 2 4-4"/></svg></span>
          <span class="profile-readonly-label">Hesap Durumu</span>
          <span class="profile-readonly-value" id="profile-status">-</span>
        </div>
      </div>

      <div class="profile-meta-grid">
        <div class="profile-meta-card">
          <span class="profile-meta-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M8 3v4M16 3v4M3 10h18"/></svg></span>
          <div class="profile-meta-body">
            <span class="profile-meta-label">Kayıt Tarihi</span>
            <span class="profile-meta-value" id="profile-created-at">-</span>
          </div>
        </div>
        <div class="profile-meta-card">
          <span class="profile-meta-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg></span>
          <div class="profile-meta-body">
            <span class="profile-meta-label">Son Güncelleme</span>
            <span class="profile-meta-value" id="profile-last-login">-</span>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script src="/js/themeToggle.js"></script>
  <script src="/js/profile.js"></script>
  <script src="/js/adminSidebar.js"></script>
  <script src="/js/sidebarProfileLink.js"></script>
  <script src="/js/sw-register.js"></script>
</body>
</html>
