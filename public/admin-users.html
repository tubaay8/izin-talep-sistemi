<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kullanicilar - Izin Talep Sistemi</title>
  <link rel="stylesheet" href="/css/style.css?v=31" />
  <link rel="stylesheet" href="/css/dark-theme.css?v=15" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#8C6E63" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <link rel="icon" href="/icons/favicon-32.png" type="image/png" />
</head>
<body class="admin-layout">
  <aside class="admin-sidebar" id="admin-sidebar">
    <div class="sidebar-profile">
      <span class="sidebar-avatar" id="sidebar-avatar">İT</span>
      <strong class="sidebar-profile-name" id="sidebar-profile-name">...</strong>
      <span class="sidebar-profile-email" id="sidebar-profile-email">...</span>
    </div>
    <nav class="sidebar-menu">
      <a href="/dashboard" class="sidebar-link">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        <span class="sidebar-label">Anasayfa</span>
      </a>
      <a href="/admin/users" class="sidebar-link active">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3"/><path d="M2 20c0-3.3 3.1-6 7-6s7 2.7 7 6"/><circle cx="17" cy="9" r="2.5"/><path d="M16 13.5c2.8.3 5 2.5 5 5.5"/></svg>
        <span class="sidebar-label">Kullanıcılar</span>
      </a>
      <a href="/admin/leave-requests" class="sidebar-link">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 6h12M8 12h12M8 18h12"/><circle cx="4" cy="6" r="1"/><circle cx="4" cy="12" r="1"/><circle cx="4" cy="18" r="1"/></svg>
        <span class="sidebar-label">Tüm İzin Talepleri</span>
      </a>
      <a href="/admin/calendar" class="sidebar-link">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18"/><circle cx="8" cy="15" r="1"/><circle cx="12" cy="15" r="1"/><circle cx="16" cy="15" r="1"/></svg>
        <span class="sidebar-label">Takvim</span>
      </a>
      <a href="/admin/departments" class="sidebar-link">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="3" width="16" height="18"/><path d="M9 8h1M14 8h1M9 12h1M14 12h1M9 16h1M14 16h1"/></svg>
        <span class="sidebar-label">Departman Yönetimi</span>
      </a>
      <a href="/admin/leave-types" class="sidebar-link">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M8 3v4M16 3v4M3 10h18"/></svg>
        <span class="sidebar-label">İzin Türü Yönetimi</span>
      </a>
      <a href="/admin/reports" class="sidebar-link">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20V10M12 20V4M20 20v-7"/><path d="M2 20h20"/></svg>
        <span class="sidebar-label">Raporlar</span>
      </a>
    </nav>
    <button type="button" class="sidebar-logout" id="sidebar-logout-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
      <span class="sidebar-label">Çıkış Yap</span>
    </button>
  </aside>

  <header class="dashboard-header">
    <h1><span class="brand-logo">İT</span> İzin Talep Sistemi</h1>
    <div class="dashboard-header-user">
      <button type="button" class="header-icon-btn" id="theme-toggle-btn" title="Karanlık modu aç/kapat" aria-label="Karanlık modu aç/kapat">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" hidden><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
      </button>
      <span>Hosgeldin, <strong id="user-name">...</strong></span>
      <span id="role-badge" class="role-badge"></span>
      <button id="logout-btn" class="logout-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
        Çıkış Yap
      </button>
    </div>
  </header>

  <main class="page-card">
    <div class="page-header">
      <h1><span class="brand-logo">İT</span> Kullanıcılar</h1>
      <div>
        <a href="/admin/users/new" class="btn-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
          Yeni Kullanici
        </a>
      </div>
    </div>

    <div class="filter-bar">
      <div class="filter-field">
        <label for="filter-search">Ara</label>
        <input type="text" id="filter-search" placeholder="Isim veya e-posta..." />
      </div>
      <div class="filter-field">
        <label for="filter-role">Rol</label>
        <select id="filter-role">
          <option value="">Tumu</option>
        </select>
      </div>
      <div class="filter-field">
        <label for="filter-department">Departman</label>
        <select id="filter-department">
          <option value="">Tumu</option>
        </select>
      </div>
      <div class="filter-field">
        <label for="filter-active">Durum</label>
        <select id="filter-active">
          <option value="">Tumu</option>
          <option value="true">Aktif</option>
          <option value="false">Pasif</option>
        </select>
      </div>
      <button type="button" id="filter-clear" class="filter-clear">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 11-3-6.7"/><path d="M21 3v6h-6"/></svg>
        Filtreleri Temizle
      </button>
    </div>

    <p id="list-message" class="form-message"></p>

    <div class="user-cards-grid" id="users-grid"></div>
    <div class="pagination" id="pagination"></div>
  </main>

  <div class="user-drawer-backdrop" id="user-drawer-backdrop"></div>
  <aside class="user-drawer" id="user-drawer" aria-hidden="true">
    <div class="user-drawer-head">
      <span class="user-drawer-avatar" id="drawer-avatar"></span>
      <div>
        <div class="user-drawer-name" id="drawer-name"></div>
        <div style="margin-top:0.35rem;">
          <span class="role-pill" id="drawer-role"></span>
        </div>
      </div>
      <button type="button" class="user-drawer-close" id="drawer-close" aria-label="Kapat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="user-drawer-body">
      <div class="user-drawer-section">
        <h3>Kişisel Bilgiler</h3>
        <dl class="user-drawer-kv">
          <dt>E-posta</dt><dd id="drawer-email"></dd>
        </dl>
      </div>
      <div class="user-drawer-section">
        <h3>Çalışma Bilgileri</h3>
        <dl class="user-drawer-kv">
          <dt>Departman</dt><dd id="drawer-dept"></dd>
          <dt>Yönetici</dt><dd id="drawer-manager"></dd>
          <dt>İzin Bakiyesi</dt><dd id="drawer-balance"></dd>
          <dt>Kayıt Tarihi</dt><dd id="drawer-created"></dd>
          <dt>Durum</dt><dd id="drawer-status"></dd>
        </dl>
      </div>
    </div>
    <div class="user-drawer-actions">
      <a class="btn-drawer btn-drawer--primary" id="drawer-edit-link" href="#">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 013 3L7 19l-4 1 1-4z"/></svg>
        Düzenle
      </a>
      <button type="button" class="btn-drawer btn-drawer--outline" id="drawer-reset-password">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 018 0v4"/></svg>
        Şifre Sıfırla
      </button>
      <button type="button" class="btn-drawer btn-drawer--danger" id="drawer-toggle-active"></button>
    </div>
  </aside>

  <script src="/js/themeToggle.js"></script>
  <script src="/vendor/sweetalert2.all.min.js"></script>
  <script src="/js/confirmDialog.js"></script>
  <script src="/js/pagination.js"></script>
  <script src="/js/admin-users.js?v=6"></script>
  <script src="/js/adminSidebar.js"></script>
  <script src="/js/sidebarProfileLink.js"></script>
  <script src="/js/sw-register.js"></script>
</body>
</html>
