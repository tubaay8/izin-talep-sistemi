<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ekip Takvimi - Izin Talep Sistemi</title>
  <link rel="stylesheet" href="/css/style.css?v=22" />
  <link rel="stylesheet" href="/css/dark-theme.css?v=12" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#8C6E63" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <link rel="icon" href="/icons/favicon-32.png" type="image/png" />
</head>
<body class="admin-layout">
  <aside class="admin-sidebar" id="admin-sidebar">
    <div class="sidebar-profile">
      <span class="sidebar-avatar" id="sidebar-avatar">İT</span>
      <strong class="sidebar-profile-name" id="sidebar-profile-name">...</strong>
      <span class="sidebar-profile-email" id="sidebar-profile-email">...</span>
    </div>
    <nav class="sidebar-menu">
      <a href="/dashboard" class="sidebar-link">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        <span class="sidebar-label">Anasayfa</span>
      </a>
      <a href="/manager/leave-requests" class="sidebar-link">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 6h12M8 12h12M8 18h12"/><circle cx="4" cy="6" r="1"/><circle cx="4" cy="12" r="1"/><circle cx="4" cy="18" r="1"/></svg>
        <span class="sidebar-label">Ekip Talepleri</span>
      </a>
      <a href="/manager/calendar" class="sidebar-link active">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18"/><circle cx="8" cy="15" r="1"/><circle cx="12" cy="15" r="1"/><circle cx="16" cy="15" r="1"/></svg>
        <span class="sidebar-label">Takvim</span>
      </a>
      <a href="/manager/reports" class="sidebar-link">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20V10M12 20V4M20 20v-7"/><path d="M2 20h20"/></svg>
        <span class="sidebar-label">Ekip İzin Raporu</span>
      </a>
    </nav>
    <button type="button" class="sidebar-logout" id="sidebar-logout-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
      <span class="sidebar-label">Çıkış Yap</span>
    </button>
  </aside>

  <header class="dashboard-header">
    <h1><span class="brand-logo">İT</span> İzin Talep Sistemi</h1>
    <div class="dashboard-header-user">
      <button type="button" class="header-icon-btn" id="theme-toggle-btn" title="Karanlık modu aç/kapat" aria-label="Karanlık modu aç/kapat">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" hidden><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
      </button>
      <span>Hosgeldin, <strong id="user-name">...</strong></span>
      <span id="role-badge" class="role-badge"></span>
      <button id="logout-btn" class="logout-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
        Çıkış Yap
      </button>
    </div>
  </header>

  <main class="page-card">
    <div class="page-header">
      <h1><span class="brand-logo">İT</span> Ekip Takvimi</h1>
    </div>

    <div class="calendar-layout">
      <div class="calendar-card">
        <div class="calendar-toolbar-filters">
          <div class="filter-field">
            <label for="filter-status">Durum</label>
            <select id="filter-status">
              <option value="">Tumu</option>
              <option value="pending">Bekliyor</option>
              <option value="approved">Onaylandi</option>
            </select>
          </div>
          <div class="filter-field">
            <label for="filter-leave-type">Izin Turu</label>
            <select id="filter-leave-type">
              <option value="">Tumu</option>
            </select>
          </div>
          <div class="filter-field filter-field--search">
            <label for="filter-search">Ara</label>
            <input type="text" id="filter-search" placeholder="Personel adi..." />
          </div>
          <button type="button" id="btn-schedule-pdf" class="btn-outline calendar-pdf-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h9l3 3v15H6z"/><path d="M12 10v6M9.5 13.5L12 16l2.5-2.5"/></svg>
            Aylik Cizelgeyi PDF Indir
          </button>
        </div>
        <div class="leave-calendar" id="leave-calendar"></div>
      </div>

      <aside class="calendar-sidebar">
        <div class="calendar-panel">
          <h2>Izin Turleri</h2>
          <ul class="calendar-legend" id="calendar-legend"></ul>
        </div>
        <div class="calendar-panel">
          <h2>Ozet Bilgiler</h2>
          <div class="calendar-summary-item">
            <span class="stat-icon calendar-summary-icon tone-info"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3"/><path d="M2 20c0-3.3 3.1-6 7-6s7 2.7 7 6"/><circle cx="17" cy="9" r="2.5"/><path d="M16 13.5c2.8.3 5 2.5 5 5.5"/></svg></span>
            <div class="calendar-summary-body">
              <span class="calendar-summary-label">Toplam Izinli</span>
              <strong id="summary-total">-</strong>
            </div>
          </div>
          <div class="calendar-summary-item">
            <span class="stat-icon calendar-summary-icon tone-approved"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg></span>
            <div class="calendar-summary-body">
              <span class="calendar-summary-label">Bugun Izinli</span>
              <strong id="summary-today">-</strong>
            </div>
          </div>
          <div class="calendar-summary-item">
            <span class="stat-icon calendar-summary-icon tone-neutral"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18"/><path d="M8 3v4M16 3v4"/></svg></span>
            <div class="calendar-summary-body">
              <span class="calendar-summary-label">Bu Hafta Izinli</span>
              <strong id="summary-week">-</strong>
            </div>
          </div>
          <div class="calendar-summary-item">
            <span class="stat-icon calendar-summary-icon tone-pending"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg></span>
            <div class="calendar-summary-body">
              <span class="calendar-summary-label">Bekleyen Talepler</span>
              <strong id="summary-pending">-</strong>
            </div>
          </div>
        </div>
      </aside>
    </div>

    <section class="today-leave-section">
      <h2>Bugun Izinli Olanlar</h2>
      <div class="today-leave-list" id="today-leave-list"></div>
    </section>
  </main>
  <script src="/js/themeToggle.js"></script>
  <script src="/vendor/sweetalert2.all.min.js"></script>
  <script src="/vendor/fullcalendar-core.min.js"></script>
  <script src="/vendor/fullcalendar-daygrid.min.js"></script>
  <script src="/vendor/fullcalendar-timegrid.min.js"></script>
  <script src="/vendor/fullcalendar-locale-tr.min.js"></script>
  <script src="/vendor/jspdf.umd.min.js"></script>
  <script src="/vendor/jspdf.plugin.autotable.min.js"></script>
  <script src="/js/reportExport.js"></script>
  <script src="/js/leaveCalendar.js"></script>
  <script src="/js/manager-calendar.js"></script>
  <script src="/js/adminSidebar.js"></script>
  <script src="/js/sidebarProfileLink.js"></script>
  <script src="/js/sw-register.js"></script>
</body>
</html>
