<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sifremi Unuttum - Izin Talep Sistemi</title>
  <link rel="stylesheet" href="/css/auth.css?v=11" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#8C6E63" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <link rel="icon" href="/icons/favicon-32.png" type="image/png" />
</head>
<body>
  <a href="/login" class="back-home-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    Girise Dön
  </a>

  <div class="auth-card auth-card--single">
    <section class="form-panel">
      <div class="form-inner">
        <a href="/" class="auth-brand">
          <span class="brand-logo">İT</span>
          <span class="brand-name">İzin Talep Sistemi</span>
        </a>
        <h1>Şifremi Unuttum</h1>
        <p class="auth-subtitle">E-posta adresinizi girin, sıfırlama bağlantısını gönderelim.</p>

        <form id="forgot-password-form" autocomplete="on">
          <label for="forgot-email">E-posta</label>
          <input type="email" id="forgot-email" name="email" autocomplete="username" required />

          <button type="submit" class="auth-submit" id="forgot-submit-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/></svg>
            Sıfırlama Bağlantısı Gönder
          </button>
          <p id="forgot-password-message" class="auth-message"></p>
        </form>

        <p class="auth-switch"><a href="/login">Girişe geri dön</a></p>
      </div>
    </section>
  </div>

  <script src="/js/forgot-password.js"></script>
  <script src="/js/sw-register.js"></script>
</body>
</html>
