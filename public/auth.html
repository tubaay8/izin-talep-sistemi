<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Giris - Izin Talep Sistemi</title>
  <link rel="stylesheet" href="/css/auth.css?v=10" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#8C6E63" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <link rel="icon" href="/icons/favicon-32.png" type="image/png" />
</head>
<body>
  <a href="/" class="back-home-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    Anasayfaya Dön
  </a>

  <div class="auth-card" id="auth-card">
    <section class="form-panel">
      <div class="form-inner">
        <a href="/" class="auth-brand">
          <span class="brand-logo">İT</span>
          <span class="brand-name">İzin Talep Sistemi</span>
        </a>
        <h1>İzin Talep Sistemine Hoş Geldiniz</h1>
        <p class="auth-subtitle">Devam etmek icin hesabiniza giris yapin.</p>

        <form id="login-form" autocomplete="on">
          <label for="login-email">E-posta</label>
          <input type="email" id="login-email" name="email" autocomplete="username" required />

          <label for="login-password">Sifre</label>
          <input type="password" id="login-password" name="password" autocomplete="current-password" required />

          <button type="submit" class="auth-submit">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/><path d="M10 17l5-5-5-5"/><path d="M15 12H3"/></svg>
            Giris Yap
          </button>
          <p id="login-message" class="auth-message"></p>
        </form>
      </div>
    </section>

    <div class="overlay-panel">
      <div class="overlay-inner">
        <span class="brand-logo">İT</span>
        <p class="overlay-eyebrow">Hoş Geldiniz</p>
        <h2>İzin Talep Sistemi</h2>
        <p>Kurumsal izin yonetim platformu.</p>
      </div>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script src="/js/sw-register.js"></script>
</body>
</html>
