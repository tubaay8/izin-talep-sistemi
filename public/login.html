<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Giris Yap - Izin Talep Sistemi</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <main class="form-card">
    <h1>Giris Yap</h1>
    <form id="login-form">
      <label for="email">E-posta</label>
      <input type="email" id="email" name="email" required />

      <label for="password">Sifre</label>
      <input type="password" id="password" name="password" required />

      <button type="submit">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/><path d="M10 17l5-5-5-5"/><path d="M15 12H3"/></svg>
        Giris Yap
      </button>
      <p id="form-message" class="form-message"></p>
    </form>
    <p>Hesabiniz yok mu? <a href="/register">Kayit Ol</a></p>
  </main>
  <script src="/js/login.js"></script>
</body>
</html>
