<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f172a" />
  <title>Baglanti Yok - Izin Talep Sistemi</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Segoe UI', Arial, sans-serif;
      color: #1e293b;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      background: linear-gradient(160deg, #eef4ff 0%, #dde9fc 100%);
    }

    .offline-card {
      max-width: 420px;
      width: 100%;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 25px 60px rgba(15, 23, 42, 0.22);
      padding: 2.75rem 2.5rem;
      text-align: center;
    }

    .brand-logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: linear-gradient(135deg, #2563eb, #0f172a);
      color: #fff;
      font-size: 0.8rem;
      font-weight: 700;
      margin-bottom: 1.25rem;
    }

    .offline-icon {
      width: 56px;
      height: 56px;
      margin: 0 auto 1.25rem;
      color: #64748b;
    }

    h1 {
      font-size: 1.3rem;
      color: #0f172a;
      margin: 0 0 0.6rem;
    }

    p {
      font-size: 0.92rem;
      color: #64748b;
      margin: 0 0 1.75rem;
      line-height: 1.5;
    }

    .retry-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.7rem 1.75rem;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background-color 0.15s ease;
    }

    .retry-btn:hover {
      background: #1d4ed8;
    }

    .retry-btn svg {
      width: 17px;
      height: 17px;
    }
  </style>
</head>
<body>
  <div class="offline-card">
    <span class="brand-logo">İT</span>
    <svg class="offline-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 8.5a16.5 16.5 0 0118 0" />
      <path d="M6.5 12a11 11 0 0111 0" />
      <path d="M10 15.5a5.5 5.5 0 014 0" />
      <path d="M3 3l18 18" />
      <circle cx="12" cy="19" r="1" fill="currentColor" stroke="none" />
    </svg>
    <h1>Internet Baglantisi Yok</h1>
    <p>Baglantinizi kontrol edip tekrar deneyin. Bazi sayfalar daha once ziyaret ettiyseniz cevrimdisi da acilabilir.</p>
    <button type="button" class="retry-btn" onclick="window.location.reload()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 11-3-6.7"/><path d="M21 3v6h-6"/></svg>
      Tekrar Dene
    </button>
  </div>
</body>
</html>
