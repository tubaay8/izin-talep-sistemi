<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tum Izin Talepleri - Izin Talep Sistemi</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0f172a" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <link rel="icon" href="/icons/favicon-32.png" type="image/png" />
</head>
<body>
  <main class="page-card">
    <div class="page-header">
      <h1><span class="brand-logo">İT</span> Tum Izin Talepleri</h1>
      <div>
        <a href="/dashboard">Anasayfa</a>
        <a href="/admin/reports">Raporlar</a>
      </div>
    </div>

    <div class="filter-bar">
      <div class="filter-field">
        <label for="filter-search">Personel Ara</label>
        <input type="text" id="filter-search" placeholder="Isim..." />
      </div>
      <div class="filter-field">
        <label for="filter-department">Departman</label>
        <select id="filter-department">
          <option value="">Tumu</option>
        </select>
      </div>
      <div class="filter-field">
        <label for="filter-status">Durum</label>
        <select id="filter-status">
          <option value="">Tumu</option>
          <option value="pending">Bekliyor</option>
          <option value="approved">Onaylandi</option>
          <option value="rejected">Reddedildi</option>
          <option value="cancelled">Iptal Edildi</option>
        </select>
      </div>
      <div class="filter-field">
        <label for="filter-leave-type">Izin Turu</label>
        <select id="filter-leave-type">
          <option value="">Tumu</option>
        </select>
      </div>
      <div class="filter-field">
        <label for="filter-date-from">Baslangic (sonrasi)</label>
        <input type="date" id="filter-date-from" />
      </div>
      <div class="filter-field">
        <label for="filter-date-to">Bitis (oncesi)</label>
        <input type="date" id="filter-date-to" />
      </div>
      <button type="button" id="filter-clear" class="filter-clear">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 11-3-6.7"/><path d="M21 3v6h-6"/></svg>
        Filtreleri Temizle
      </button>
    </div>

    <p id="list-message" class="form-message"></p>

    <div class="table-scroll">
      <table class="data-table" id="requests-table">
        <thead>
          <tr>
            <th>Personel</th>
            <th>Departman</th>
            <th>Yonetici</th>
            <th>Izin Turu</th>
            <th>Baslangic</th>
            <th>Bitis</th>
            <th>Durum</th>
            <th>Islemler</th>
          </tr>
        </thead>
        <tbody id="requests-body"></tbody>
      </table>
    </div>
  </main>
  <script src="/vendor/sweetalert2.all.min.js"></script>
  <script src="/js/confirmDialog.js"></script>
  <script src="/js/admin-leave-requests.js"></script>
  <script src="/js/sw-register.js"></script>
</body>
</html>
