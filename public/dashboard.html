<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anasayfa - Izin Talep Sistemi</title>
  <link rel="stylesheet" href="/css/style.css?v=30" />
  <link rel="stylesheet" href="/css/dark-theme.css?v=15" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#8C6E63" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <link rel="icon" href="/icons/favicon-32.png" type="image/png" />
</head>
<body class="admin-layout">
  <aside class="admin-sidebar" id="admin-sidebar">
    <div class="sidebar-profile">
      <span class="sidebar-avatar" id="sidebar-avatar">İT</span>
      <strong class="sidebar-profile-name" id="sidebar-profile-name">...</strong>
      <span class="sidebar-profile-email" id="sidebar-profile-email">...</span>
    </div>
    <nav class="sidebar-menu" id="sidebar-menu"></nav>
    <button type="button" class="sidebar-logout" id="sidebar-logout-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
      <span class="sidebar-label">Çıkış Yap</span>
    </button>
  </aside>

  <div class="dashboard-wrap">
    <header class="dashboard-header">
      <h1><span class="brand-logo">İT</span> İzin Talep Sistemi</h1>
      <div class="dashboard-header-user">
        <button type="button" class="header-icon-btn" id="theme-toggle-btn" title="Karanlık modu aç/kapat" aria-label="Karanlık modu aç/kapat">
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" hidden><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
        </button>
        <span>Hosgeldin, <strong id="user-name">...</strong></span>
        <span id="role-badge" class="role-badge"></span>
        <button id="logout-btn" class="logout-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
          Çıkış Yap
        </button>
      </div>
    </header>

    <div class="role-banner">
      <span id="role-content"></span>
      <a id="primary-action" class="btn-primary" href="/leave-requests/new" hidden></a>
    </div>

    <section class="stats-grid" id="stats-grid"></section>

    <section class="dashboard-columns">
      <div class="main-column" id="main-column"></div>
      <div class="side-column">
        <div class="panel">
          <h2>Hızli Erişim</h2>
          <div class="quick-links" id="quick-links"></div>
        </div>
      </div>
    </section>
  </div>
  <script src="/js/themeToggle.js"></script>
  <script src="/vendor/sweetalert2.all.min.js"></script>
  <script src="/js/confirmDialog.js"></script>
  <script src="/js/pagination.js"></script>
  <script src="/js/dashboard.js?v=11"></script>
  <script src="/js/sidebarProfileLink.js"></script>
  <script src="/js/sw-register.js"></script>
</body>
</html>
