<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kullanici - Izin Talep Sistemi</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0f172a" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <link rel="icon" href="/icons/favicon-32.png" type="image/png" />
</head>
<body>
  <main class="form-card">
    <h1 id="form-title">Yeni Kullanici</h1>
    <form id="user-form">
      <label for="full_name">Ad Soyad</label>
      <input type="text" id="full_name" name="full_name" required />

      <label for="email">E-posta</label>
      <input type="email" id="email" name="email" required />

      <label for="password" id="password-label">Sifre</label>
      <input type="password" id="password" name="password" minlength="6" />

      <label for="role_id">Rol</label>
      <select id="role_id" name="role_id" required>
        <option value="">Seciniz...</option>
      </select>

      <label for="department_id">Departman</label>
      <select id="department_id" name="department_id" required>
        <option value="">Seciniz...</option>
      </select>

      <label for="manager_id">Yonetici (opsiyonel)</label>
      <select id="manager_id" name="manager_id">
        <option value="">Seciniz...</option>
      </select>

      <div id="active-field" hidden>
        <label for="is_active">Aktif mi?</label>
        <select id="is_active" name="is_active">
          <option value="true">Aktif</option>
          <option value="false">Pasif</option>
        </select>
      </div>

      <button type="submit" id="submit-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>
        Kullanici Olustur
      </button>
      <p id="form-message" class="form-message"></p>
    </form>
    <p><a href="/admin/users">&larr; Kullanici Listesine Don</a></p>
  </main>
  <script src="/js/admin-user-form.js"></script>
  <script src="/js/sw-register.js"></script>
</body>
</html>
