<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sifre Degistir - Izin Talep Sistemi</title>
  <link rel="stylesheet" href="/css/auth.css?v=10" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#8C6E63" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <link rel="icon" href="/icons/favicon-32.png" type="image/png" />
</head>
<body>
  <div class="auth-card auth-card--single">
    <section class="form-panel">
      <div class="form-inner">
        <a href="/" class="auth-brand">
          <span class="brand-logo">İT</span>
          <span class="brand-name">İzin Talep Sistemi</span>
        </a>
        <h1>Sifrenizi Degistirin</h1>
        <p class="auth-subtitle">Guvenliginiz icin devam etmeden once yeni bir sifre belirlemeniz gerekiyor.</p>

        <form id="change-password-form" autocomplete="on">
          <label for="new-password">Yeni Sifre</label>
          <input type="password" id="new-password" name="new_password" autocomplete="new-password" minlength="6" required />

          <label for="new-password-confirm">Yeni Sifre (Tekrar)</label>
          <input type="password" id="new-password-confirm" name="new_password_confirm" autocomplete="new-password" minlength="6" required />

          <button type="submit" class="auth-submit">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>
            Sifreyi Guncelle
          </button>
          <p id="change-password-message" class="auth-message"></p>
        </form>

        <p class="auth-switch"><button type="button" id="logout-btn">Cikis Yap</button></p>
      </div>
    </section>
  </div>

  <script src="/js/change-password.js"></script>
  <script src="/js/sw-register.js"></script>
</body>
</html>
