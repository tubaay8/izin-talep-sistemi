<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Izin Turu Yonetimi - Izin Talep Sistemi</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0f172a" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <link rel="icon" href="/icons/favicon-32.png" type="image/png" />
</head>
<body>
  <main class="page-card">
    <div class="page-header">
      <h1><span class="brand-logo">İT</span> Izin Turu Yonetimi</h1>
      <div>
        <a href="/dashboard">Anasayfa</a>
      </div>
    </div>

    <form id="create-form" class="filter-bar">
      <div class="filter-field">
        <label for="new-leave-type-name">Yeni Izin Turu</label>
        <input type="text" id="new-leave-type-name" placeholder="Izin turu adi" required />
      </div>
      <div class="filter-field">
        <label for="new-leave-type-description">Aciklama (opsiyonel)</label>
        <input type="text" id="new-leave-type-description" placeholder="Aciklama" />
      </div>
      <button type="submit" class="btn-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
        Ekle
      </button>
    </form>

    <p id="list-message" class="form-message"></p>

    <div class="table-scroll">
      <table class="data-table" id="leave-types-table">
        <thead>
          <tr>
            <th>Ad</th>
            <th>Aciklama</th>
            <th>Islemler</th>
          </tr>
        </thead>
        <tbody id="leave-types-body"></tbody>
      </table>
    </div>
  </main>
  <script src="/vendor/sweetalert2.all.min.js"></script>
  <script src="/js/confirmDialog.js"></script>
  <script src="/js/admin-leave-types.js"></script>
  <script src="/js/sw-register.js"></script>
</body>
</html>
