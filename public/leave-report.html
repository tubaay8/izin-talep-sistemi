<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Izin Raporum - Izin Talep Sistemi</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0f172a" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <link rel="icon" href="/icons/favicon-32.png" type="image/png" />
</head>
<body>
  <main class="page-card">
    <div class="page-header">
      <h1><span class="brand-logo">İT</span> Izin Raporum</h1>
      <div class="no-print">
        <a href="/dashboard">Anasayfa</a>
        <a href="/leave-requests">Izin Taleplerim</a>
      </div>
    </div>
    <p class="report-meta" id="report-meta"></p>

    <div class="filter-bar no-print">
      <div class="filter-field">
        <label for="filter-status">Durum</label>
        <select id="filter-status">
          <option value="">Tumu</option>
          <option value="pending">Bekliyor</option>
          <option value="approved">Onaylandi</option>
          <option value="rejected">Reddedildi</option>
          <option value="cancelled">Iptal Edildi</option>
        </select>
      </div>
      <div class="filter-field">
        <label for="filter-leave-type">Izin Turu</label>
        <select id="filter-leave-type">
          <option value="">Tumu</option>
        </select>
      </div>
      <div class="filter-field">
        <label for="filter-date-from">Baslangic (sonrasi)</label>
        <input type="date" id="filter-date-from" />
      </div>
      <div class="filter-field">
        <label for="filter-date-to">Bitis (oncesi)</label>
        <input type="date" id="filter-date-to" />
      </div>
      <button type="button" id="filter-clear" class="filter-clear">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 11-3-6.7"/><path d="M21 3v6h-6"/></svg>
        Filtreleri Temizle
      </button>
    </div>

    <div class="report-summary" id="report-summary"></div>

    <div class="report-actions no-print">
      <button type="button" id="btn-print" class="btn-outline">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="9" width="12" height="7"/><path d="M6 9V4h12v5M6 16v4h12v-4"/></svg>
        Yazdir
      </button>
      <button type="button" id="btn-pdf" class="btn-outline">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h9l3 3v15H6z"/><path d="M12 10v6M9.5 13.5L12 16l2.5-2.5"/></svg>
        PDF Indir
      </button>
      <button type="button" id="btn-csv" class="btn-outline">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h9l3 3v15H6z"/><path d="M12 10v6M9.5 13.5L12 16l2.5-2.5"/></svg>
        CSV Indir
      </button>
    </div>

    <p id="list-message" class="form-message"></p>

    <div class="table-scroll">
      <table class="data-table" id="report-table">
        <thead>
          <tr>
            <th>Izin Turu</th>
            <th>Baslangic</th>
            <th>Bitis</th>
            <th>Aciklama</th>
            <th>Durum</th>
            <th class="no-print">Form</th>
          </tr>
        </thead>
        <tbody id="report-body"></tbody>
      </table>
    </div>
  </main>
  <script src="/vendor/jspdf.umd.min.js"></script>
  <script src="/vendor/jspdf.plugin.autotable.min.js"></script>
  <script src="/js/reportExport.js"></script>
  <script src="/js/leave-report.js"></script>
  <script src="/js/sw-register.js"></script>
</body>
</html>
