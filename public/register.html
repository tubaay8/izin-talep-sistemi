<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kayit Ol - Izin Talep Sistemi</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <main class="form-card">
    <h1>Kayit Ol</h1>
    <form id="register-form">
      <label for="full_name">Ad Soyad</label>
      <input type="text" id="full_name" name="full_name" required />

      <label for="email">E-posta</label>
      <input type="email" id="email" name="email" required />

      <label for="password">Sifre</label>
      <input type="password" id="password" name="password" minlength="6" required />

      <label for="password_confirm">Sifre (Tekrar)</label>
      <input type="password" id="password_confirm" name="password_confirm" minlength="6" required />

      <label for="department_id">Departman</label>
      <select id="department_id" name="department_id" required>
        <option value="">Seciniz...</option>
      </select>

      <label for="manager_id">Yoneticiniz (opsiyonel)</label>
      <select id="manager_id" name="manager_id">
        <option value="">Seciniz...</option>
      </select>

      <button type="submit">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3"/><path d="M2 20c0-3.3 3.1-6 7-6s7 2.7 7 6"/><path d="M19 8v6M16 11h6"/></svg>
        Kayit Ol
      </button>
      <p id="form-message" class="form-message"></p>
    </form>
    <p>Zaten hesabiniz var mi? <a href="/login">Giris Yap</a></p>
  </main>
  <script src="/js/register.js"></script>
</body>
</html>
